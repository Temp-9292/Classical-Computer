<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Computer - Calculator Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', system-ui; }
        .computer-box {
            border: 12px solid #3b2a1f;
            box-shadow: 0 0 30px #00ff00, inset 0 0 40px #00aa00;
            background: linear-gradient(#112211, #001100);
        }
        .screen {
            resize: both;
            overflow: auto;
            min-width: 300px;
            min-height: 200px;
        }
        .gate { transition: all 0.3s; }
        .active { fill: #00ff00 !important; filter: drop-shadow(0 0 10px #00ff00); }
    </style>
</head>
<body class="bg-black text-green-400 p-4">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl mb-6 text-center">🖥️ VIRTUAL CLASSICAL COMPUTER 🖥️</h1>
        
        <div class="flex gap-6">
            <!-- COMPUTER BOX -->
            <div id="computer-box" class="computer-box w-1/2 rounded-3xl p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b border-green-500 pb-2">
                    <h2 class="text-xl">CPU ARCHITECTURE LIVE</h2>
                    <button onclick="toggleComputerBox()" class="bg-red-600 hover:bg-red-700 px-4 py-1 text-sm rounded">HIDE / UNHIDE</button>
                </div>
                
                <!-- SVG Architecture -->
                <svg id="architecture-svg" width="100%" height="320" viewBox="0 0 600 320" class="bg-black rounded-2xl p-4">
                    <!-- Transistor -->
                    <rect x="50" y="50" width="80" height="40" rx="5" fill="#334433" stroke="#00ff00" stroke-width="4"/>
                    <text x="65" y="75" fill="#00ff00" font-size="12">TRANSISTOR</text>
                    <!-- AND Gate -->
                    <rect x="180" y="50" width="80" height="60" rx="10" fill="#334433" stroke="#00ff00" stroke-width="4" id="and-gate"/>
                    <text x="200" y="85" fill="#00ff00" font-size="14">AND</text>
                    <!-- OR Gate -->
                    <path d="M280 80 Q340 50 340 110 Q280 140 280 80" fill="#334433" stroke="#00ff00" stroke-width="4" id="or-gate"/>
                    <text x="290" y="105" fill="#00ff00" font-size="14">OR</text>
                    <!-- Half Adder -->
                    <rect x="400" y="120" width="160" height="80" rx="8" fill="#112211" stroke="#ffff00" stroke-width="6" id="adder"/>
                    <text x="420" y="155" fill="#ffff00" font-size="16">HALF ADDER (ALU)</text>
                    <!-- Wires -->
                    <line x1="130" y1="70" x2="180" y2="70" stroke="#00ff00" stroke-width="6" id="wire1"/>
                    <line x1="260" y1="80" x2="280" y2="80" stroke="#00ff00" stroke-width="6" id="wire2"/>
                    <line x1="340" y1="130" x2="400" y2="130" stroke="#ffff00" stroke-width="8" id="wire3"/>
                    <text x="20" y="280" fill="#ffff00" font-size="12" id="step-text">Waiting for calculation...</text>
                </svg>
                
                <div id="inside-log" class="mt-4 text-xs bg-black p-3 rounded-xl h-24 overflow-auto font-mono"></div>
            </div>

            <!-- RESULT SCREEN (Calculator) -->
            <div id="result-screen" class="screen w-1/2 bg-[#0a0a0a] border-8 border-[#555] rounded-3xl p-4 flex flex-col shadow-2xl">
                <div class="flex justify-between mb-3">
                    <div class="flex gap-2">
                        <button onclick="resizeScreen(1)" class="bg-yellow-600 px-3 py-1 text-xs rounded">SMALL</button>
                        <button onclick="resizeScreen(2)" class="bg-yellow-600 px-3 py-1 text-xs rounded">MEDIUM</button>
                        <button onclick="resizeScreen(3)" class="bg-yellow-600 px-3 py-1 text-xs rounded">LARGE</button>
                    </div>
                    <h2 class="text-xl text-yellow-400">RESULT MONITOR</h2>
                </div>
                
                <!-- Calculator Display -->
                <div id="display" class="bg-black text-right text-4xl p-6 mb-6 rounded-2xl border-4 border-green-500 font-mono min-h-[80px] flex items-end justify-end overflow-hidden">
                    0
                </div>
                
                <!-- Keypad -->
                <div class="grid grid-cols-4 gap-3 text-2xl">
                    <button onclick="appendToDisplay('7')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">7</button>
                    <button onclick="appendToDisplay('8')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">8</button>
                    <button onclick="appendToDisplay('9')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">9</button>
                    <button onclick="clearDisplay()" class="bg-red-600 hover:bg-red-700 py-6 rounded-2xl">C</button>
                    
                    <button onclick="appendToDisplay('4')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">4</button>
                    <button onclick="appendToDisplay('5')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">5</button>
                    <button onclick="appendToDisplay('6')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">6</button>
                    <button onclick="appendToDisplay('/')" class="bg-blue-600 hover:bg-blue-700 py-6 rounded-2xl">÷</button>
                    
                    <button onclick="appendToDisplay('1')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">1</button>
                    <button onclick="appendToDisplay('2')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">2</button>
                    <button onclick="appendToDisplay('3')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">3</button>
                    <button onclick="appendToDisplay('*')" class="bg-blue-600 hover:bg-blue-700 py-6 rounded-2xl">×</button>
                    
                    <button onclick="appendToDisplay('0')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl col-span-2">0</button>
                    <button onclick="appendToDisplay('.')" class="bg-[#222] hover:bg-[#444] py-6 rounded-2xl">.</button>
                    <button onclick="calculate()" class="bg-green-600 hover:bg-green-700 py-6 rounded-2xl">=</button>
                    
                    <button onclick="appendToDisplay('+')" class="bg-blue-600 hover:bg-blue-700 py-6 rounded-2xl">+</button>
                    <button onclick="appendToDisplay('-')" class="bg-blue-600 hover:bg-blue-700 py-6 rounded-2xl">-</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '0';
        const display = document.getElementById('display');
        const insideLog = document.getElementById('inside-log');
        
        function updateDisplay() {
            display.textContent = currentInput;
        }
        
        function appendToDisplay(val) {
            if (currentInput === '0' && val !== '.') currentInput = val;
            else currentInput += val;
            updateDisplay();
        }
        
        function clearDisplay() {
            currentInput = '0';
            updateDisplay();
            resetArchitecture();
        }
        
        function calculate() {
            try {
                // Simple safe eval
                let result = eval(currentInput.replace('×','*').replace('÷','/'));
                const oldInput = currentInput;
                currentInput = result.toString();
                updateDisplay();
                
                // Show inside computer animation
                simulateInsideComputer(oldInput, result);
            } catch(e) {
                currentInput = 'ERROR';
                updateDisplay();
                setTimeout(clearDisplay, 1200);
            }
        }
        
        function simulateInsideComputer(input, result) {
            insideLog.innerHTML = `<span class="text-yellow-300">INPUT: ${input}</span><br>`;
            
            // Binary conversion
            const num1 = parseFloat(input.split(/[-+*/]/)[0]) || 0;
            const num2 = parseFloat(input.split(/[-+*/]/)[1]) || 0;
            insideLog.innerHTML += `Binary: ${num1.toString(2)} + ${num2.toString(2)}<br>`;
            
            // Activate gates
            document.getElementById('and-gate').classList.add('active');
            document.getElementById('or-gate').classList.add('active');
            document.getElementById('adder').classList.add('active');
            document.getElementById('wire1').setAttribute('stroke', '#ffff00');
            document.getElementById('wire2').setAttribute('stroke', '#ffff00');
            document.getElementById('wire3').setAttribute('stroke', '#ffff00');
            
            // Step text
            document.getElementById('step-text').textContent = `HALF ADDER RUNNING → Result: ${result}`;
            
            // Log
            insideLog.innerHTML += `Transistors ON → Logic Gates firing → ALU calculated!<br>`;
            insideLog.innerHTML += `<span class="text-green-300">FINAL RESULT: ${result}</span>`;
            
            // Reset after 4 seconds
            setTimeout(resetArchitecture, 4000);
        }
        
        function resetArchitecture() {
            document.querySelectorAll('.gate, #adder').forEach(el => el.classList.remove('active'));
            document.getElementById('wire1').setAttribute('stroke', '#00ff00');
            document.getElementById('wire2').setAttribute('stroke', '#00ff00');
            document.getElementById('wire3').setAttribute('stroke', '#ffff00');
            document.getElementById('step-text').textContent = 'Waiting for next calculation...';
            insideLog.innerHTML = '';
        }
        
        function toggleComputerBox() {
            const box = document.getElementById('computer-box');
            box.style.display = box.style.display === 'none' ? 'flex' : 'none';
        }
        
        function resizeScreen(size) {
            const screen = document.getElementById('result-screen');
            if (size === 1) { screen.style.width = '40%'; screen.style.height = '380px'; }
            if (size === 2) { screen.style.width = '55%'; screen.style.height = '480px'; }
            if (size === 3) { screen.style.width = '70%'; screen.style.height = '580px'; }
        }
        
        // Tailwind script run
        document.documentElement.setAttribute('data-tailwind-config', JSON.stringify({ theme: { extend: {} } }));
        updateDisplay();
    </script>
</body>
</html>
